{% extends "base.html" %}
{% block title %}Medicine List | Panda Medicine{% endblock %}
{% block content %}
<style>
    .badge-expired {
        background-color: #dc3545;
        color: #fff;
    }

    .badge-low-stock {
        background-color: #fd7e14;
        color: #fff;
    }

    .badge-in-stock {
        background-color: #28a745;
        color: #fff;
    }

    .table th {
        font-size: 13px;
    }

    .table td {
        font-size: 13px;
        vertical-align: middle;
    }
</style>

<div class="page-header d-flex justify-content-between align-items-center">
    <h3 class="page-title mb-0">Medicine Inventory</h3>
    <button class="btn btn-gradient-primary btn-sm" onclick="window.location.href='/addMedicine/'">
        <i class="mdi mdi-plus"></i> Add Medicine
    </button>
</div>

<div class="row mt-3">
    <div class="col-12 grid-margin stretch-card">
        <div class="card">
            <div class="card-body">

                <!-- Search -->
                <div class="row mb-3">
                    <div class="col-md-4">
                        <input type="text" id="searchInput" class="form-control"
                            placeholder="Search by name, batch, rack...">
                    </div>
                </div>

                <!-- Table -->
                <div class="table-responsive">
                    <table class="table table-bordered table-hover">
                        <thead class="table-light">
                            <tr>
                                <th style="width: 50px;">#</th>
                                <th>Medicine Name</th>
                                <th>Rack</th>
                                <th>Stock</th>
                                <th>MRP (₹)</th>
                                <th>Expiry</th>
                                <th>Uses</th>
                                <th style="width: 70px;">Action</th>
                            </tr>
                        </thead>
                        <tbody id="medicineTableBody">
                            <tr>
                                <td colspan="8" class="text-center text-muted">Loading medicines...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <!-- Pagination -->
                <div class="d-flex justify-content-between align-items-center mt-3">
                    <div id="paginationInfo" class="text-muted"></div>
                    <ul class="pagination pagination-sm mb-0" id="pagination"></ul>
                </div>

            </div>
        </div>
    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", function () {

        const tableBody = document.getElementById("medicineTableBody");
        const pagination = document.getElementById("pagination");
        const paginationInfo = document.getElementById("paginationInfo");
        const searchInput = document.getElementById("searchInput");

        let currentPage = 1;
        let pageSize = 10;
        let currentSearch = "";

        function formatExpiry(dt) {
            if (!dt) return "-";
            const d = new Date(dt);
            const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
            return months[d.getMonth()] + " " + d.getFullYear();
        }

        function stockBadge(qty) {
            if (qty <= 0) return `<span class="badge badge-expired">Out of Stock</span>`;
            if (qty <= 10) return `<span class="badge badge-low-stock">${qty}</span>`;
            return `<span class="badge badge-in-stock">${qty}</span>`;
        }

        /* -------------------- Fetch -------------------- */

        function fetchMedicines(page = 1) {
            tableBody.innerHTML = `<tr><td colspan="8" class="text-center text-muted">Loading...</td></tr>`;

            const url = `/apis/medicineList?page=${page}&page_size=${pageSize}&search=${encodeURIComponent(currentSearch)}`;

            fetch(url)
                .then(res => res.json())
                .then(response => {
                    const results = response.results;
                    const data = results.data || [];
                    const totalCount = response.count;

                    renderTable(data, page);
                    renderPagination(response, page);
                    renderInfo(page, totalCount);
                })
                .catch(() => {
                    tableBody.innerHTML = `<tr><td colspan="8" class="text-center text-danger">Failed to load medicines</td></tr>`;
                });
        }

        /* -------------------- Render Table -------------------- */

        function renderTable(data, page) {
            tableBody.innerHTML = "";

            if (!data.length) {
                tableBody.innerHTML = `<tr><td colspan="8" class="text-center text-muted">No medicines found</td></tr>`;
                return;
            }

            data.forEach((item, index) => {
                let badgeHtml = "";
                if (item.is_expired === true) {
                    badgeHtml = `<span class="badge badge-expired ms-1">Expired</span>`;
                } else if (item.current_stock <= item.low_stock_alert && item.low_stock_alert > 0) {
                    badgeHtml = `<span class="badge badge-low-stock ms-1">Low Stock</span>`;
                }

                tableBody.innerHTML += `
                    <tr>
                        <td>${(page - 1) * pageSize + index + 1}</td>
                        <td>
                            <div class="fw-bold">${item.name} ${badgeHtml}</div>
                            <div class="text-muted small mt-1">Batch: ${item.batch_number || "-"}</div>
                        </td>
                        <td>${item.rack_location || "-"}</td>
                        <td>${stockBadge(item.current_stock)}</td>
                        <td>₹${item.mrp}</td>
                        <td>${formatExpiry(item.expiry_date)}</td>
                        <td>${item.medicine_uses || "-"}</td>
                        <td class="text-center">
                            <button class="btn btn-sm btn-outline-primary view-btn" data-id="${item.id}" title="View / Edit">
                                <i class="mdi mdi-eye"></i>
                            </button>
                        </td>
                    </tr>
                `;
            });

            document.querySelectorAll(".view-btn").forEach(btn => {
                btn.addEventListener("click", function () {
                    window.location.href = `/addMedicine/?id=${this.getAttribute("data-id")}`;
                });
            });
        }

        /* -------------------- Pagination -------------------- */

        function renderPagination(response, page) {
            pagination.innerHTML = "";
            const totalPages = Math.ceil(response.count / pageSize);

            pagination.innerHTML += `
                <li class="page-item ${page === 1 ? "disabled" : ""}">
                    <a class="page-link" href="#">Previous</a>
                </li>
            `;

            for (let i = 1; i <= totalPages; i++) {
                pagination.innerHTML += `
                    <li class="page-item ${i === page ? "active" : ""}">
                        <a class="page-link" href="#">${i}</a>
                    </li>
                `;
            }

            pagination.innerHTML += `
                <li class="page-item ${page === totalPages ? "disabled" : ""}">
                    <a class="page-link" href="#">Next</a>
                </li>
            `;

            Array.from(pagination.querySelectorAll(".page-link")).forEach(link => {
                link.addEventListener("click", function (e) {
                    e.preventDefault();
                    if (this.textContent === "Previous" && page > 1) currentPage--;
                    else if (this.textContent === "Next" && page < totalPages) currentPage++;
                    else if (!isNaN(this.textContent)) currentPage = Number(this.textContent);
                    fetchMedicines(currentPage);
                });
            });
        }

        /* -------------------- Info -------------------- */

        function renderInfo(page, total) {
            const start = (page - 1) * pageSize + 1;
            const end = Math.min(page * pageSize, total);
            paginationInfo.textContent = `Showing ${start}–${end} of ${total} medicines`;
        }

        /* -------------------- Search -------------------- */

        let searchTimer = null;
        searchInput.addEventListener("keyup", function () {
            clearTimeout(searchTimer);
            searchTimer = setTimeout(() => {
                currentSearch = this.value.trim();
                currentPage = 1;
                fetchMedicines();
            }, 400);
        });

        /* -------------------- Initial Load -------------------- */
        fetchMedicines();

    });
</script>

{% endblock %}
