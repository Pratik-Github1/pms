{% extends "base.html" %}
{% block title %}Dashboard | Panda Medicine{% endblock %}
{% block content %}

<style>
  .stat-card {
    border: none;
    border-radius: 12px;
    transition: transform 0.2s, box-shadow 0.2s;
    overflow: hidden;
  }

  .stat-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 25px rgba(0, 0, 0, .12);
  }

  .stat-card .card-body {
    padding: 1.5rem;
  }

  .stat-icon {
    width: 48px;
    height: 48px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
  }

  .stat-value {
    font-size: 28px;
    font-weight: 700;
    margin: 0;
  }

  .stat-label {
    font-size: 13px;
    color: #6c757d;
    margin: 0;
  }

  .alert-card {
    border-left: 4px solid;
    border-radius: 8px;
  }

  .alert-card.warning {
    border-left-color: #fd7e14;
  }

  .alert-card.danger {
    border-left-color: #dc3545;
  }

  .alert-card.info {
    border-left-color: #0dcaf0;
  }
</style>

<div class="page-header">
  <h3 class="page-title">
    <span class="page-title-icon bg-gradient-primary text-white me-2">
      <i class="mdi mdi-home"></i>
    </span> Dashboard
  </h3>
</div>

<!-- Stats Row -->
<div class="row" id="statsRow">

  <div class="col-md-3 grid-margin stretch-card">
    <div class="card stat-card bg-gradient-primary text-white">
      <div class="card-body d-flex align-items-center justify-content-between">
        <div>
          <p class="stat-value" id="totalMedicines">-</p>
          <p class="stat-label text-white-50">Total Medicines</p>
        </div>
        <div class="stat-icon" style="background: rgba(255,255,255,.2);">
          <i class="mdi mdi-pill text-white"></i>
        </div>
      </div>
    </div>
  </div>

  <div class="col-md-3 grid-margin stretch-card">
    <div class="card stat-card bg-gradient-info text-white">
      <div class="card-body d-flex align-items-center justify-content-between">
        <div>
          <p class="stat-value" id="totalSuppliers">-</p>
          <p class="stat-label text-white-50">Total Suppliers</p>
        </div>
        <div class="stat-icon" style="background: rgba(255,255,255,.2);">
          <i class="mdi mdi-truck text-white"></i>
        </div>
      </div>
    </div>
  </div>

  <div class="col-md-3 grid-margin stretch-card">
    <div class="card stat-card bg-gradient-success text-white">
      <div class="card-body d-flex align-items-center justify-content-between">
        <div>
          <p class="stat-value" id="totalSalesBills">-</p>
          <p class="stat-label text-white-50">Sales Bills</p>
        </div>
        <div class="stat-icon" style="background: rgba(255,255,255,.2);">
          <i class="mdi mdi-receipt text-white"></i>
        </div>
      </div>
    </div>
  </div>

  <div class="col-md-3 grid-margin stretch-card">
    <div class="card stat-card bg-gradient-warning text-white">
      <div class="card-body d-flex align-items-center justify-content-between">
        <div>
          <p class="stat-value" id="totalPurchaseBills">-</p>
          <p class="stat-label text-white-50">Purchase Bills</p>
        </div>
        <div class="stat-icon" style="background: rgba(255,255,255,.2);">
          <i class="mdi mdi-cart text-white"></i>
        </div>
      </div>
    </div>
  </div>

</div>

<!-- Alerts Row -->
<div class="row">

  <div class="col-md-4 grid-margin stretch-card">
    <div class="card alert-card warning">
      <div class="card-body d-flex align-items-center">
        <div class="me-3">
          <i class="mdi mdi-alert-circle-outline text-warning" style="font-size:36px;"></i>
        </div>
        <div>
          <h5 class="mb-1" id="lowStockCount">-</h5>
          <p class="mb-0 text-muted" style="font-size:13px;">Low Stock Medicines</p>
        </div>
      </div>
    </div>
  </div>

  <div class="col-md-4 grid-margin stretch-card">
    <div class="card alert-card danger">
      <div class="card-body d-flex align-items-center">
        <div class="me-3">
          <i class="mdi mdi-close-circle-outline text-danger" style="font-size:36px;"></i>
        </div>
        <div>
          <h5 class="mb-1" id="outOfStockCount">-</h5>
          <p class="mb-0 text-muted" style="font-size:13px;">Out of Stock</p>
        </div>
      </div>
    </div>
  </div>

  <div class="col-md-4 grid-margin stretch-card">
    <div class="card alert-card info">
      <div class="card-body d-flex align-items-center">
        <div class="me-3">
          <i class="mdi mdi-clock-alert-outline text-info" style="font-size:36px;"></i>
        </div>
        <div>
          <h5 class="mb-1" id="expiredCount">-</h5>
          <p class="mb-0 text-muted" style="font-size:13px;">Expired Medicines</p>
        </div>
      </div>
    </div>
  </div>

</div>

<script>
  document.addEventListener("DOMContentLoaded", function () {
    fetch("/apis/dashboardStats")
      .then(r => r.json())
      .then(res => {
        if (!res.status) return;
        const d = res.data;
        document.getElementById("totalMedicines").textContent = d.total_medicines;
        document.getElementById("totalSuppliers").textContent = d.total_suppliers;
        document.getElementById("totalSalesBills").textContent = d.total_sales_bills;
        document.getElementById("totalPurchaseBills").textContent = d.total_purchase_bills;
        document.getElementById("lowStockCount").textContent = d.low_stock_count;
        document.getElementById("outOfStockCount").textContent = d.out_of_stock_count;
        document.getElementById("expiredCount").textContent = d.expired_count;
      });
  });
</script>

{% endblock %}
