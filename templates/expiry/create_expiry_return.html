{% extends "base.html" %}
{% block title %}Create Expiry Return | Panda Medicine{% endblock %}
{% block content %}

<style>
    .search-select-wrapper {
        position: relative;
    }

    .search-select-wrapper input.search-input {
        width: 100%;
        padding: 6px 10px;
        border: 1px solid #ced4da;
        border-radius: 4px;
        font-size: 13px;
        background: #fff;
    }

    .search-select-wrapper .dropdown-list {
        position: absolute;
        top: 100%;
        left: 0;
        right: 0;
        z-index: 999;
        max-height: 220px;
        overflow-y: auto;
        background: #fff;
        border: 1px solid #ced4da;
        border-top: none;
        border-radius: 0 0 4px 4px;
        display: none;
        box-shadow: 0 4px 12px rgba(0, 0, 0, .1);
    }

    .search-select-wrapper .dropdown-list .dd-item {
        padding: 7px 10px;
        cursor: pointer;
        font-size: 13px;
        border-bottom: 1px solid #f0f0f0;
    }

    .search-select-wrapper .dropdown-list .dd-item:hover {
        background: #e9f5ff;
    }

    .search-select-wrapper .dropdown-list .dd-item .med-name {
        font-weight: 600;
        color: #333;
    }

    .search-select-wrapper .dropdown-list .dd-item .med-meta {
        font-size: 11px;
        color: #888;
        margin-top: 2px;
    }

    .stock-badge {
        display: inline-block;
        padding: 1px 6px;
        border-radius: 3px;
        font-size: 10px;
        font-weight: 600;
    }

    .stock-ok {
        background: #d4edda;
        color: #155724;
    }

    .stock-low {
        background: #fff3cd;
        color: #856404;
    }

    .stock-out {
        background: #f8d7da;
        color: #721c24;
    }

    #expiryItemsTable th {
        font-size: 13px;
        white-space: nowrap;
    }

    #expiryItemsTable td {
        vertical-align: middle;
    }

    .qty-input {
        width: 90px;
        text-align: center;
    }

    .price-input {
        width: 120px;
    }
</style>

<div class="page-header">
    <h3 class="page-title">Create Expiry Return</h3>
</div>

<div class="row">
    <div class="col-12 grid-margin stretch-card">
        <div class="card">
            <div class="card-body">

                <div id="formAlert" class="alert d-none mb-3" role="alert"></div>

                <form id="expiryReturnForm">

                    <div class="row">
                        <div class="col-md-6 form-group">
                            <label>Supplier <span class="text-danger">*</span></label>
                            <select class="form-control" id="supplier_id" required>
                                <option value="">Select Supplier</option>
                            </select>
                        </div>
                        <div class="col-md-6 form-group">
                            <label>Remarks</label>
                            <input type="text" class="form-control" id="remarks" placeholder="Any remarks...">
                        </div>
                    </div>

                    <hr>
                    <h5>Expired Medicines</h5>

                    <div class="table-responsive">
                        <table class="table table-bordered" id="expiryItemsTable">
                            <thead class="bg-light">
                                <tr>
                                    <th style="width: 45%;">Medicine</th>
                                    <th>Quantity</th>
                                    <th>Rate (₹)</th>
                                    <th style="width: 50px;"></th>
                                </tr>
                            </thead>
                            <tbody id="itemsBody"></tbody>
                        </table>
                    </div>

                    <button type="button" class="btn btn-sm btn-outline-secondary mt-2" id="addItemBtn">
                        <i class="mdi mdi-plus"></i> Add Item
                    </button>

                    <hr>

                    <button type="submit" class="btn btn-gradient-primary" id="submitBtn">
                        <i class="mdi mdi-content-save"></i> Submit Expiry Return
                    </button>

                </form>

            </div>
        </div>
    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", function () {

        const form = document.getElementById("expiryReturnForm");
        const alertBox = document.getElementById("formAlert");
        const submitBtn = document.getElementById("submitBtn");
        const itemsBody = document.getElementById("itemsBody");
        const addItemBtn = document.getElementById("addItemBtn");

        let MEDICINES = [];

        function showMessage(msg, type = "success") {
            alertBox.className = `alert alert-${type}`;
            alertBox.textContent = msg;
            alertBox.classList.remove("d-none");
            window.scrollTo(0, 0);
        }

        function stockClass(qty) {
            if (qty <= 0) return "stock-out";
            if (qty <= 10) return "stock-low";
            return "stock-ok";
        }

        function buildDropdownItems(wrapper, medicines) {
            const list = wrapper.querySelector(".dropdown-list");
            list.innerHTML = "";
            medicines.forEach(m => {
                const rack = m.rack_location || "N/A";
                const supplier = m.supplier_name || "-";
                const stk = m.current_stock || 0;
                const div = document.createElement("div");
                div.className = "dd-item";
                div.setAttribute("data-id", m.id);
                div.setAttribute("data-name", m.name);
                div.innerHTML = `
                <div class="med-name">${m.name} <span class="stock-badge ${stockClass(stk)}">Stock: ${stk}</span></div>
                <div class="med-meta">Rack: ${rack} | Supplier: ${supplier} | MRP: ₹${m.mrp}</div>
            `;
                list.appendChild(div);
            });
        }

        function initSearchDropdown(wrapper) {
            const input = wrapper.querySelector(".search-input");
            const list = wrapper.querySelector(".dropdown-list");
            const hiddenInput = wrapper.querySelector(".medicine_id");

            input.addEventListener("focus", () => {
                buildDropdownItems(wrapper, MEDICINES);
                list.style.display = "block";
            });

            input.addEventListener("input", () => {
                const q = input.value.toLowerCase();
                const filtered = MEDICINES.filter(m => m.name.toLowerCase().includes(q));
                buildDropdownItems(wrapper, filtered);
                list.style.display = "block";
            });

            list.addEventListener("click", (e) => {
                const item = e.target.closest(".dd-item");
                if (!item) return;
                hiddenInput.value = item.dataset.id;
                input.value = item.dataset.name;
                list.style.display = "none";
            });

            document.addEventListener("click", (e) => {
                if (!wrapper.contains(e.target)) list.style.display = "none";
            });
        }

        function addItemRow() {
            itemsBody.insertAdjacentHTML("beforeend", `
            <tr>
                <td>
                    <div class="search-select-wrapper">
                        <input type="hidden" class="medicine_id" value="">
                        <input type="text" class="search-input" placeholder="Type to search medicine..." autocomplete="off">
                        <div class="dropdown-list"></div>
                    </div>
                </td>
                <td>
                    <input type="number" class="form-control qty-input quantity" min="1" placeholder="0">
                </td>
                <td>
                    <input type="number" step="0.01" class="form-control price-input rate" placeholder="0.00">
                </td>
                <td class="text-center">
                    <button type="button" class="btn btn-sm btn-danger removeBtn">×</button>
                </td>
            </tr>
        `);
            const newRow = itemsBody.lastElementChild;
            initSearchDropdown(newRow.querySelector(".search-select-wrapper"));
        }

        addItemBtn.onclick = () => addItemRow();

        itemsBody.addEventListener("click", e => {
            if (e.target.classList.contains("removeBtn")) {
                e.target.closest("tr").remove();
            }
        });

        // Load suppliers
        fetch("/apis/getSuppliers")
            .then(r => r.json())
            .then(res => {
                if (!res.status) return;
                const sel = document.getElementById("supplier_id");
                res.data.forEach(s => {
                    sel.innerHTML += `<option value="${s.id}">${s.company_name || "Supplier #" + s.id}</option>`;
                });
            });

        // Load medicines
        fetch("/apis/getMedicines")
            .then(r => r.json())
            .then(res => {
                if (!res.status) return;
                MEDICINES = res.data;
                addItemRow();
            });

        form.onsubmit = e => {
            e.preventDefault();

            const items = [...itemsBody.querySelectorAll("tr")].map(row => ({
                medicine_id: row.querySelector(".medicine_id").value,
                quantity: row.querySelector(".quantity").value,
                rate: row.querySelector(".rate").value || 0,
            }));

            if (items.some(i => !i.medicine_id || !i.quantity)) {
                return showMessage("Please fill all medicine and quantity fields.", "danger");
            }

            const payload = {
                supplier_id: document.getElementById("supplier_id").value,
                remarks: document.getElementById("remarks").value,
                items: items,
            };

            submitBtn.disabled = true;
            submitBtn.innerHTML = "Processing...";

            fetch("/apis/expiryReturns", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            })
                .then(r => r.json())
                .then(res => {
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = '<i class="mdi mdi-content-save"></i> Submit Expiry Return';

                    if (!res.status) return showMessage(res.message, "danger");
                    showMessage(`Expiry return ${res.data.return_number} created successfully!`);
                    form.reset();
                    itemsBody.innerHTML = "";
                    addItemRow();
                })
                .catch(() => {
                    submitBtn.disabled = false;
                    showMessage("Server error", "danger");
                });
        };

    });
</script>

{% endblock %}
